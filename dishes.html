<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pratos | Café Santuário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ===== DISHES PAGE STYLES ===== */
        .dishes-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .dishes-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .dishes-page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
        }

        .dishes-page-header p {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        .btn-new-dish {
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-new-dish:hover { background: #1b4332; }

        /* ===== GRID DE PRATOS ===== */
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .dish-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dish-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.13);
        }

        .dish-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #ccc;
        }

        .dish-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dish-card-body {
            padding: 16px;
        }

        .dish-card-name {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .dish-card-desc {
            font-size: 13px;
            color: #777;
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .dish-card-price {
            font-size: 18px;
            font-weight: 800;
            color: #2d6a4f;
            margin-bottom: 12px;
        }

        .dish-card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit-dish, .btn-delete-dish {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-edit-dish {
            background: #e8f5e9;
            color: #2d6a4f;
        }

        .btn-edit-dish:hover { background: #c8e6c9; }

        .btn-delete-dish {
            background: #fdecea;
            color: #c0392b;
        }

        .btn-delete-dish:hover { background: #f5c6cb; }

        /* ===== LOADING / EMPTY ===== */
        .dishes-loading, .dishes-empty {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            grid-column: 1/-1;
        }

        .dishes-empty i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.95); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
        }

        .btn-modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a1a;
            background: #fafafa;
            transition: border 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d6a4f;
            background: #fff;
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Upload de imagem */
        .upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #2d6a4f;
            background: #f0faf5;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-area i {
            font-size: 32px;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
        }

        .upload-area p {
            font-size: 13px;
            color: #888;
            margin: 0;
        }

        .upload-preview {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        .btn-submit-dish {
            width: 100%;
            padding: 14px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-submit-dish:hover { background: #1b4332; }
        .btn-submit-dish:disabled { background: #aaa; cursor: not-allowed; }

        /* ===== INGREDIENTES CHECKBOXES ===== */
        .ingrediente-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #444;
            background: #f0f0f0;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ingrediente-label:hover { background: #e0f0e8; }
        .ingrediente-check:checked + span { color: #2d6a4f; font-weight: 700; }
        .ingrediente-label:has(.ingrediente-check:checked) { background: #d4edda; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a1a;
            color: #fff;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: #2d6a4f; }
        .toast.error   { background: #c0392b; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="main-header">
        <a href="index.html" class="logo" style="text-decoration: none;">Café Santuário</a>
        <nav class="main-nav" id="main-navbar"></nav>
        <div class="header-icons"></div>
    </header>

    <!-- MAIN -->
    <div class="dishes-wrapper">

        <div class="dishes-page-header">
            <div>
                <h1>🍽️ Gestão de Pratos</h1>
                <p>Adicione, edite ou remova pratos do catálogo.</p>
            </div>
            <button class="btn-new-dish" onclick="abrirModalCriar()">
                <i class="fa-solid fa-plus"></i> Novo Prato
            </button>
        </div>

        <div class="dishes-grid" id="dishes-grid">
            <div class="dishes-loading">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:36px; margin-bottom:12px; display:block;"></i>
                A carregar pratos...
            </div>
        </div>

    </div>

    <!-- MODAL CRIAR / EDITAR -->
    <div class="modal-overlay" id="modal-prato">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-titulo">Novo Prato</h2>
                <button class="btn-modal-close" onclick="fecharModal()">✕</button>
            </div>

            <div class="form-group">
                <label>Nome do Prato *</label>
                <input type="text" id="input-nome" placeholder="Ex: Croissant de Trufa" maxlength="100">
            </div>

            <div class="form-group">
                <label>Ingredientes</label>
                <div id="ingredientes-container" style="
                    max-height: 150px;
                    overflow-y: auto;
                    border: 1.5px solid #e0e0e0;
                    border-radius: 10px;
                    padding: 8px;
                    background: #fafafa;
                    display: flex;
                    flex-direction: column;
                    gap: 4px;
                ">
                    <p style="color:#aaa; font-size:13px;">A carregar ingredientes...</p>
                </div>
            </div>

            <div class="form-group">
                <label>Preço (€) *</label>
                <input type="number" id="input-preco" placeholder="0.00" step="0.01" min="0">
            </div>

            <div class="form-group">
                <label>Imagem do Prato</label>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="input-imagem" accept="image/*" onchange="previewImagem(this)">
                    <div id="upload-placeholder">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Clique ou arraste uma imagem aqui<br><small>JPG, PNG, WEBP até 5MB</small></p>
                    </div>
                    <img id="preview-img" class="upload-preview" alt="Preview">
                </div>
            </div>

            <input type="hidden" id="input-id">

            <button class="btn-submit-dish" id="btn-submit" onclick="submeterPrato()">
                <i class="fa-solid fa-check"></i> Guardar Prato
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="api.js"></script>
    <script src="main.js"></script>
    <script src="dishes.js"></script>

</body>
</html>
