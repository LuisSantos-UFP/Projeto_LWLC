<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Café Santuário</title>

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <main class="login-page">

        <!-- LEFT SIDE -->
        <section class="login-left">

            <div class="overlay"></div>

            <div class="left-content">

                <span class="badge">
                    ☕ CAFÉ SANTUÁRIO
                </span>

                <h1>
                    Bem-vindo<br>
                    de volta
                </h1>

                <p>
                    Entre na sua conta para gerir reservas,
                    pedidos e experiências personalizadas.
                </p>

            </div>

        </section>

        <!-- RIGHT SIDE -->
        <section class="login-right">

            <a href="index.html" class="back-home">
                 Café Santuário
            </a>

            <div class="login-box">

                <div class="login-header">

                    <h2>Iniciar Sessão</h2>

                    <p>
                        Introduza os seus dados para continuar.
                    </p>

                </div>

                <form class="login-form">

                    <div class="input-group">

                        <label>Email</label>

                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>

                            <input type="email" placeholder="exemplo@email.com">
                        </div>

                    </div>

                    <div class="input-group">

                        <label>Password</label>

                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>

                            <input type="password" placeholder="••••••••">
                        </div>

                    </div>

                    <div class="login-options">

                        <label class="remember">

                            <input type="checkbox">

                            <span>Lembrar-me</span>

                        </label>

                        <a href="#">
                            Esqueceu-se da password?
                        </a>

                    </div>

                    <button type="submit" class="login-btn">
                        Entrar
                    </button>

                </form>

                <div class="divider">
                    <span>ou</span>
                </div>

                <button class="google-btn">

                    <i class="fa-brands fa-google"></i>

                    Continuar com Google

                </button>

                <p class="register-text">

                    Ainda não tem conta?

                    <a href="#">
                        Criar Conta
                    </a>

                </p>

            </div>

        </section>

    </main>

</body>
</html>
