<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Meu Perfil - Café Santuário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">Café Santuário</a>
        <nav class="main-nav" id="main-navbar"></nav>
        <div class="header-icons"></div>
    </header>

    <main class="perfil-container">
        <div class="perfil-header">
            <div class="perfil-avatar">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <h2 id="perfil-username" class="perfil-titulo">Carregando...</h2>
            <span id="role-badge" class="perfil-badge">CLIENT</span>
        </div>

        <div class="perfil-corpo">

            <!-- SALDO + BOTÃO -->
            <div class="info-group">
                <div class="info-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="info-detalhes">
                    <p class="info-label">Saldo Disponível</p>
                    <p id="perfil-balance" class="info-valor" style="font-size:24px; color:#2d6a4f; font-weight:700;">0.00 €</p>
                </div>
                <button id="btn-abrir-pagamento" title="Adicionar Saldo" class="btn-add"
                    style="margin-left:auto; width:38px; height:38px; flex-shrink:0;">
                    <i class="fa-solid fa-plus" style="font-size:15px;"></i>
                </button>
            </div>

            <!-- CARGO -->
            <div class="info-group">
                <div class="info-icon"><i class="fa-solid fa-id-card"></i></div>
                <div class="info-detalhes">
                    <p class="info-label">Cargo</p>
                    <p id="info-role-detalhado" class="info-valor">-</p>
                </div>
            </div>

            <!-- ESTADO -->
            <div class="info-group">
                <div class="info-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="info-detalhes">
                    <p class="info-label">Estado da Conta</p>
                    <p class="info-valor" style="color:#2ecc71; font-weight:bold;">
                        <i class="fa-solid fa-circle-check"></i> Ativa
                    </p>
                </div>
            </div>

        </div>
    </main>

    <!-- ===================== MODAL DE PAGAMENTO ===================== -->
     
    <div id="modal-pagamento" class="modal-overlay">
        <div class="modal-box">

            <div class="modal-header">
                <h2><i class="fa-solid fa-credit-card" style="margin-right:8px; color:#2d6a4f;"></i>Carregar Saldo</h2>
                <button id="btn-fechar-modal" class="btn-modal-close">✕</button>
            </div>

            <p style="font-size:14px; color:#888; margin:-10px 0 20px;">Introduza os dados do cartão para adicionar saldo.</p>

            <div class="form-section-title">Dados do Cartão</div>

            <div class="form-group">
                <label>Titular do Cartão</label>
                <input id="cc-nome" type="text" placeholder="Nome Apelido">
            </div>

            <div class="form-group">
                <label>Número do Cartão</label>
                <input id="cc-numero" type="text" placeholder="0000 0000 0000 0000" maxlength="19" style="letter-spacing:2px;">
            </div>

            <div style="display:flex; gap:12px;">
                <div class="form-group" style="flex:1;">
                    <label>Validade</label>
                    <input id="cc-validade" type="text" placeholder="MM/AA" maxlength="5">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>CVV</label>
                    <input id="cc-cvv" type="password" placeholder="•••" maxlength="3">
                </div>
            </div>

            <div class="form-section-title">Valor a Carregar</div>

            <div class="form-group">
                <label>Montante (€)</label>
                <input id="cc-valor" type="number" placeholder="0.00" min="0.01" step="0.01">
            </div>

            <p id="modal-erro" class="form-error" style="display:none;"></p>

            <div class="modal-actions">
                <button id="btn-cancelar-modal" class="btn-cancelar">Cancelar</button>
                <button id="btn-confirmar-pagamento" class="btn-guardar">
                    <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Confirmar Pagamento
                </button>
            </div>

        </div>
    </div>

    <script src="api.js"></script>
    <script src="main.js"></script>
    <script src="perfil.js"></script>
</body>
</html>
