<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Menus | Café Santuário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .menus-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }
 
        .menus-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
 
        .menus-page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
        }
 
        .menus-page-header p {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }
 
        .btn-new-menu {
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
 
        .btn-new-menu:hover { background: #1b4332; }
 
        /* ===== GRID DE MENUS ===== */
        .menus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
 
        .menu-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
 
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.13);
        }
 
        .menu-card-header {
            background: #2d6a4f;
            color: #fff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
 
        .menu-card-date {
            font-size: 16px;
            font-weight: 800;
        }
 
        .menu-card-weekday {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }
 
        .menu-card-badge {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
        }
 
        .menu-card-body {
            padding: 16px 20px;
        }
 
        .menu-dish-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
 
        .menu-dish-row:last-of-type {
            border-bottom: none;
        }
 
        .menu-dish-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
 
        .icon-meat { background: #fdecea; }
        .icon-fish { background: #e3f2fd; }
        .icon-veg  { background: #e8f5e9; }
 
        .menu-dish-info label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 0.5px;
        }
 
        .menu-dish-info p {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0;
        }
 
        .menu-dish-info p.empty {
            color: #ccc;
            font-style: italic;
            font-weight: 400;
        }
 
        .menu-card-actions {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-top: 1px solid #f5f5f5;
        }
 
        .btn-edit-menu, .btn-delete-menu {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
 
        .btn-edit-menu { background: #e8f5e9; color: #2d6a4f; }
        .btn-edit-menu:hover { background: #c8e6c9; }
        .btn-delete-menu { background: #fdecea; color: #c0392b; }
        .btn-delete-menu:hover { background: #f5c6cb; }
 
        /* ===== LOADING / EMPTY ===== */
        .menus-loading, .menus-empty {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            grid-column: 1/-1;
        }
 
        .menus-empty i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
 
        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
 
        .modal-overlay.active { display: flex; }
 
        .modal-box {
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
 
        @keyframes modalIn {
            from { transform: scale(0.95); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
 
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
 
        .modal-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
        }
 
        .btn-modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
        }
 
        .form-group {
            margin-bottom: 16px;
        }
 
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a1a;
            background: #fafafa;
            transition: border 0.2s;
            box-sizing: border-box;
        }
 
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d6a4f;
            background: #fff;
        }
 
        .form-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #2d6a4f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #e8f5e9;
        }
 
        .btn-submit-menu {
            width: 100%;
            padding: 14px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
 
        .btn-submit-menu:hover { background: #1b4332; }
        .btn-submit-menu:disabled { background: #aaa; cursor: not-allowed; }
 
        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a1a;
            color: #fff;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s ease;
        }
 
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #2d6a4f; }
        .toast.error { background: #c0392b; }
    </style>
</head>
<body>
 
    <header class="main-header">
        <a href="index.html" class="logo" style="text-decoration: none;">Café Santuário</a>
        <nav class="main-nav" id="main-navbar"></nav>
        <div class="header-icons"></div>
    </header>
 
    <div class="menus-wrapper">
 
        <div class="menus-page-header">
            <div>
                <h1>📋 Gestão de Menus</h1>
                <p>Crie e gira os menus diários do Café Santuário.</p>
            </div>
            <button class="btn-new-menu" onclick="abrirModalCriar()">
                <i class="fa-solid fa-plus"></i> Novo Menu
            </button>
        </div>
 
        <div class="menus-grid" id="menus-grid">
            <div class="menus-loading">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:36px; margin-bottom:12px; display:block;"></i>
                A carregar menus...
            </div>
        </div>
 
    </div>
 
    <!-- MODAL CRIAR / EDITAR -->
    <div class="modal-overlay" id="modal-menu">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-titulo">Novo Menu</h2>
                <button class="btn-modal-close" onclick="fecharModal()">✕</button>
            </div>
 
            <div class="form-group">
                <label>📅 Data do Menu *</label>
                <input type="date" id="input-data">
            </div>
 
            <div class="form-section-title">🍽️ Pratos do Menu</div>
 
            <div class="form-group">
                <label>🥩 Prato de Carne</label>
                <select id="select-carne">
                    <option value="">— Sem prato de carne —</option>
                </select>
            </div>
 
            <div class="form-group">
                <label>🐟 Prato de Peixe</label>
                <select id="select-peixe">
                    <option value="">— Sem prato de peixe —</option>
                </select>
            </div>
 
            <div class="form-group">
                <label>🥗 Prato Vegetariano</label>
                <select id="select-veg">
                    <option value="">— Sem prato vegetariano —</option>
                </select>
            </div>
 
            <input type="hidden" id="input-id">
 
            <button class="btn-submit-menu" id="btn-submit" onclick="submeterMenu()">
                <i class="fa-solid fa-check"></i> Guardar Menu
            </button>
        </div>
    </div>
 
    <div class="toast" id="toast"></div>
 
    <script src="api.js"></script>
    <script src="main.js"></script>
    <script src="menugestao.js"></script>
 
</body>
</html>
