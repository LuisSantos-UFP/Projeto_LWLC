<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Café Santuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="login-page">

    <!-- Lado esquerdo — imagem/texto (igual ao login) -->
    <section class="login-left">
        <div class="overlay"></div>
        <div class="left-content">
            <span class="badge">☕ CAFÉ SANTUÁRIO</span>
            <h1>Junte-se ao<br>Santuário</h1>
            <p>Crie a sua conta para guardar as suas preferências, gerir reservas e aceder a experiências exclusivas.</p>
        </div>
    </section>

    <!-- Lado direito — formulário -->
    <section class="login-right">
        <div class="form-container">

            <header class="form-header">
                <h2>Criar Nova Conta</h2>
                <p>Preencha os dados abaixo para se registar.</p>
            </header>

            <form id="register-form" class="login-form">

                <div class="form-group">
                    <label for="reg-username">Nome de Utilizador</label>
                    <input type="text" id="reg-username" placeholder="Escolha um username" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Palavra-passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye toggle-password-icon" id="toggle-pass"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirmar Palavra-passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye toggle-password-icon" id="toggle-confirm"></i>
                    </div>
                </div>

                <!-- Mensagem de erro inline (sem alert) -->
                <p class="form-error" id="registo-erro" style="display:none;"></p>

                <button type="submit" class="login-btn">
                    Criar Conta
                </button>

            </form>

            <p class="register-text">
                Já tem uma conta?
                <a href="login.html">Iniciar Sessão</a>
            </p>

        </div>
    </section>

</main>

<script src="api.js"></script>
<script src="registo.js"></script>
</body>
</html>
